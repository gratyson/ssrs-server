ssrs.datasource.postgres.url=
ssrs.datasource.postgres.username=
ssrs.datasource.postgres.password=

server.contextPath=/
server.port=1443
server.port.http=1080
server.tomcat.max-part-count=50
server.ssl.key-alias=selfsigned_ssrs_prod
server.ssl.key-store-password=
server.ssl.key-store=classpath:jks/ssrs-prod-server.jks
server.ssl.key-store-provider=SUN
server.ssl.key-store-type=JKS

ajp.port=9090
ajp.secret=
ajp.enabled=true

logging.level.root=info
logging.file.name=/home/ssrs/logs/ssrs.log

server.error.include-exception = true
server.error.include-message = always
server.error.include-stacktrace = never

server.jwt.secret =
server.jwt.cookieExpirySec = 8640000
server.jwt.tokenCookieName = accessToken
server.jwt.displayNameCookieName = userDisplayName

ssrs.learning.initialLearningDelaySec = 14400
ssrs.learning.nearMissCorrectLearningDelaySec = 86400
ssrs.learning.standardIncorrectBoost = 2
ssrs.learning.nearMissBoost = 3

ssrs.review.futureEventAllowedRatio = .8
ssrs.review.testBaseTimeSec = 15
ssrs.review.testAdditionalTimePerChar = 2

ssrs.maintenance.purgeAfterDays = 30

ssrs.security.allowUserRegistration = false

ssrs.auth.validation.regex = ^(?=.*[a-z])[a-zA-Z0-9!@#$%^&*()+\\-=,._`~\\[\\]{}|;:<>?]{6,64}$
ssrs.auth.validation.message = Password must be at least 6 characters long and must only contain letters, numbers, or any of the following symbols: !@#$%^&*()+-=,._`~[]{}|;:<>?

aws.dynamodb.events.deleteAfterDays = 7
aws.dynamodb.reviews.deleteAfterDays = 7
aws.dynamodb.maxWriteBatchSize = 25
aws.dynamodb.maxReadBatchSize = 50